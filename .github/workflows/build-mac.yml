name: Build macOS App

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Run build script
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Package macOS App Bundle
        run: |
          cd dist
          if [ -d "Silent_Guardian.app" ]; then
            zip -r Silent_Guardian_macOS_app.zip Silent_Guardian.app
          elif [ -f "Silent_Guardian" ]; then
            zip Silent_Guardian_macOS_binary.zip Silent_Guardian
          else
            echo "Nenhum arquivo ou pacote de build encontrado em dist/"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Build
          path: dist/*.zip
